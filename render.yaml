## AssetStream — Render Blueprint
## Deploy the entire stack with one click via render.com/deploy

services:
  # ── Managed Redis ──────────────────────────────────────────────────────────
  - type: redis
    name: assetstream-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # ── Django API (web) ───────────────────────────────────────────────────────
  - type: web
    name: assetstream-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    dockerCommand: bash start.sh
    plan: free
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: POSTGRES_DB
        value: postgres
      - key: POSTGRES_USER
        value: postgres
      - key: POSTGRES_PASSWORD
        sync: false  # Paste your Supabase DB password here in Render dashboard
      - key: DB_HOST
        sync: false  # Paste your Supabase host e.g. db.xxxx.supabase.co
      - key: DB_PORT
        value: "5432"
      - key: REDIS_URL
        fromService:
          type: redis
          name: assetstream-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: assetstream-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://assetstream-frontend.onrender.com
      - key: GROQ_API_KEY
        sync: false  # Paste your Groq API key here in Render dashboard
      - key: GROQ_MODEL
        value: qwen/qwen3-32b

  # ── Next.js Frontend (web) ─────────────────────────────────────────────────
  - type: web
    name: assetstream-frontend
    runtime: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    plan: free
    envVars:
      - key: PORT
        value: 3000
      - key: NEXT_PUBLIC_API_URL
        value: https://assetstream-api.onrender.com/api
        scope: build
